# Render.com Blueprint — deploy the Tesla Analyzer backend from a phone browser.
# In Render: New → Blueprint → connect this repo. Render reads this file and
# builds the Dockerfile. Free plan; Singapore region (closest to Malaysia).
services:
  - type: web
    name: tesla-analyzer
    runtime: docker
    region: singapore
    plan: free
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: ENERGY_PRICE_PER_KWH
        value: "0.90"
      - key: CURRENCY
        value: RM
      - key: RATED_WH_PER_KM
        value: "150"
      # Persistent storage: paste a PERMANENTLY-FREE Postgres connection string
      # from Neon (neon.tech → sign up with GitHub → create project → copy the
      # connection string). Render prompts you for this value when applying the
      # blueprint. Unlike Render's own free Postgres, Neon's free tier does not
      # expire after 30 days.
      - key: DATABASE_URL
        sync: false
      # Private dashboard: Render prompts you for this value too — pick any
      # passcode; the app then requires it to open.
      - key: APP_PASSCODE
        sync: false
      # Leave Tesla credentials unset — you'll link your account from the
      # dashboard (🔗 Link Tesla Account → paste an access token).
