# Render.com Blueprint — deploy the Tesla Analyzer backend from a phone browser.
# In Render: New → Blueprint → connect this repo. Render reads this file and
# builds the Dockerfile. Free plan; Singapore region (closest to Malaysia).
services:
  - type: web
    # No "tesla" in the name: the service name becomes the public URL, and
    # Tesla's developer portal rejects domains containing their trademark.
    name: ev-drive-analyzer
    runtime: docker
    region: singapore
    plan: free
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: ENERGY_PRICE_PER_KWH
        value: "0.90"
      - key: CURRENCY
        value: RM
      - key: RATED_WH_PER_KM
        value: "150"
      # Persistent storage: paste a PERMANENTLY-FREE Postgres connection string
      # from Neon (neon.tech → sign up with GitHub → create project → copy the
      # connection string). Render prompts you for this value when applying the
      # blueprint. Unlike Render's own free Postgres, Neon's free tier does not
      # expire after 30 days.
      - key: DATABASE_URL
        sync: false
      # Private dashboard: Render prompts you for this value too — pick any
      # passcode; the app then requires it to open.
      - key: APP_PASSCODE
        sync: false
      # Talk to Tesla's current (Fleet) API — Asia-Pacific is served by the
      # North America endpoint.
      - key: TESLA_API_BASE_URL
        value: https://fleet-api.prd.na.vn.cloud.tesla.com
      # From your app at developer.tesla.com — enables "Sign in with Tesla"
      # with auto-refreshing tokens. Render prompts for both on apply.
      - key: TESLA_CLIENT_ID
        sync: false
      - key: TESLA_CLIENT_SECRET
        sync: false
