name: Sync car from Tesla

# Hands-off logging without a third-party scheduler: this pings your deployed
# app's /api/sync on a timer, which wakes the (free-tier, sleeping) Render
# service and records new drives/charges. It is battery-safe — the app's own
# sleep-window stops actually polling the car once it's been idle ~15 min.
#
# Resolution boost: GitHub Actions can't schedule tighter than 5 minutes, but
# a single run can poll several times internally. /api/sync returns
# "poll_fast": true only while a trip is actively in progress, or briefly
# after the car came online on its own (not our doing) and may be about to
# drive off. We loop on that hint alone — an online-but-idle car is never
# polled beyond its normal 5-minute cadence, so this can't add phantom drain:
# each extra call in the loop only happens when the car is already awake for
# its own reasons (driving, or a wake we didn't trigger).
#
# To enable it, add two repository secrets (Settings → Secrets and variables →
# Actions → New repository secret):
#   RENDER_URL  e.g. https://ev-drive-analyzer.onrender.com   (no trailing slash)
#   SYNC_KEY    the same value you set in your Render environment
# Without both secrets this job simply does nothing, so it's safe in any fork.

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch: {}   # also runnable by hand from the Actions tab

# Never let two pings overlap (a wake can take ~30 s).
concurrency:
  group: sync-car
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/sync (escalate briefly while poll_fast is true)
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          SYNC_KEY: ${{ secrets.SYNC_KEY }}
        run: |
          if [ -z "$RENDER_URL" ] || [ -z "$SYNC_KEY" ]; then
            echo "RENDER_URL / SYNC_KEY not configured — nothing to do."
            echo "Add them as repository secrets to enable automatic syncing."
            exit 0
          fi
          # Up to 6 pings, ~20s apart (~2 min worst case) — comfortably inside
          # the 5-min tick so this run finishes before the next one is due.
          # Stops the moment the server says poll_fast is false (trip over,
          # or nothing happened during a bounded wake window), so a quiet car
          # costs exactly one call, same as before.
          for i in $(seq 1 6); do
            resp=$(curl -sS --max-time 15 -w $'\nHTTP %{http_code}' \
              "${RENDER_URL%/}/api/sync?key=${SYNC_KEY}" || true)
            echo "$resp"
            case "$resp" in
              *'"poll_fast":true'*) sleep 20 ;;
              *) break ;;
            esac
          done
