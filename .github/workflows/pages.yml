name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    # Only redeploy the demo site when something it serves actually changed —
    # backend-only merges skip Pages entirely (fewer runs, fewer flaky fails).
    paths:
      - "app/static/**"
      - "app/analysis/**"
      - "app/api/**"
      - "app/sample_data.py"
      - "app/importer.py"
      - "app/models.py"
      - "scripts/build_site.py"
      - "requirements.txt"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static dashboard
        run: python scripts/build_site.py --out site

      # enablement: true turns on GitHub Pages (source = GitHub Actions) via the
      # API if it isn't already, so the deploy job below won't fail on a repo
      # where Pages hasn't been enabled manually.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # GitHub Pages occasionally rejects a deployment with a transient
      # "Deployment failed, try again later." — retry once after a pause
      # instead of failing the run (and emailing) on the first hiccup.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
